# 多 app 子域名反代配置
# SSL 由外部负载均衡器（Cloudflare 或 Certbot）处理
#
# 架构：单容器内 PM2 启动 4 个 Next.js 进程，Nginx 按 Host header 反代到对应端口。
# 容器内部通信走 127.0.0.1，无需跨容器网络。

upstream web {
    server 127.0.0.1:3000;
}

upstream admin {
    server 127.0.0.1:3001;
}

upstream api {
    server 127.0.0.1:3002;
}

upstream platform {
    server 127.0.0.1:3003;
}

# 用户前台
server {
    listen 80;
    server_name app.gpt2image.pro;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 大文件上传支持（PSD 导出等）
        client_max_body_size 200m;
    }
}

# 管理后台
server {
    listen 80;
    server_name admin.gpt2image.pro;

    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API
server {
    listen 80;
    server_name api.gpt2image.pro;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # API 请求体限制
        client_max_body_size 50m;
    }
}

# 营销/文档站（同时接收裸域名和 www）
server {
    listen 80;
    server_name platform.gpt2image.pro gpt2image.pro www.gpt2image.pro;

    location / {
        proxy_pass http://platform;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

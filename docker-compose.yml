name: gpt2image-pro

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gpt2image}
      POSTGRES_USER: ${POSTGRES_USER:-gpt2image}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gpt2image} -d ${POSTGRES_DB:-gpt2image}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/meowfree/gpt2image-pro-migrate:${GPT2IMAGE_IMAGE_TAG:-latest}
    env_file:
      - ${GPT2IMAGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpt2image}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gpt2image}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 单容器多 app 服务（PM2 管理 4 个 Next.js 进程）
  app:
    image: ghcr.io/meowfree/gpt2image-pro-app:${GPT2IMAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${GPT2IMAGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpt2image}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gpt2image}
      # 鉴权必填:未配置会导致所有人(含超管)登录失败,务必先在 env 文件中设置。
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET 必填:会话签名密钥,未设置将无法登录}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL 必填:须为站点公网访问地址(如 https://your-domain),否则登录失败}
      ADMIN_AUTH_URL: ${ADMIN_AUTH_URL:-http://localhost:3001}
      ADMIN_BETTER_AUTH_SECRET: ${ADMIN_BETTER_AUTH_SECRET:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3002}
      NEXT_PUBLIC_PLATFORM_URL: ${NEXT_PUBLIC_PLATFORM_URL:-http://localhost:3003}
      LOCAL_STORAGE_PATH: /app/storage
      CHATGPT_WEB_PROXY_URL: http://chatgpt-web-proxy:3021
      CHATGPT_WEB_PROXY_SECRET: ${CHATGPT_WEB_PROXY_SECRET:-}
      GPT2IMAGE_BOOTSTRAP_CREDENTIALS_PATH: /app/.gpt2image/super-admin-credentials.txt
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${ADMIN_PORT:-3001}:3001"
      - "${API_PORT:-3002}:3002"
      - "${PLATFORM_PORT:-3003}:3003"
    volumes:
      - app-storage:/app/storage
      - app-bootstrap:/app/.gpt2image
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      chatgpt-web-proxy:
        condition: service_started

  chatgpt-web-proxy:
    image: ghcr.io/meowfree/gpt2image-pro-chatgpt-web-proxy:${GPT2IMAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      CHATGPT_WEB_PROXY_BIND: :3021
      CHATGPT_WEB_PROXY_SECRET: ${CHATGPT_WEB_PROXY_SECRET:-}
      CHATGPT_WEB_PROXY_PROFILE: ${CHATGPT_WEB_PROXY_PROFILE:-chrome_146}
      CHATGPT_WEB_PROXY_TIMEOUT_SECONDS: ${CHATGPT_WEB_PROXY_TIMEOUT_SECONDS:-300}
      CHATGPT_WEB_PROXY_MAX_BODY_MB: ${CHATGPT_WEB_PROXY_MAX_BODY_MB:-64}
      CHATGPT_WEB_UPSTREAM_PROXY_URL: ${CHATGPT_WEB_UPSTREAM_PROXY_URL:-}

volumes:
  postgres-data:
  app-storage:
  app-bootstrap:
